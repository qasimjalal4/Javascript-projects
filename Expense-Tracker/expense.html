<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="expense.css">
</head>
<body>
  
  <section>
    <div class="input-grid">
      <input class="item-box" type="text" placeholder="Enter item...">
      <input class="amount-box" type="number" placeholder="Enter amount...">
      <button class="add-button">Add Expense</button>
      <select class="expense-category">
        <option value="">Select Category</option>
        <option value="food">Food</option>
        <option value="entertainment">Entertainment</option>
        <option value="bills">Bills</option>
        <option value="shopping">Shopping</option>
        <option value="other">Other</option>
      </select>
      <input class="input-date" type="date">
    </div>
    <div class="expense-calculation-bar">
     <div class="amount-box">Total: Rs.<span id="total-amount"></span></div>
     <div class="quantity-box">Total Expense: <span id="total-quantity"></span></div>
     <div class="highest-expense-box">Highest Expense: <span id="highest-expense"></span></div>
    </div>

    <div class="expense-grid"></div>
  </section>

  <script src="expense.js"></script>
</body>
</html>
