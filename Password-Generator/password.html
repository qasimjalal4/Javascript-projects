<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator</title>
  <link rel="stylesheet" href="password.css">
</head>
<body>

  <div class="container">
     
    <h1>Password Generator</h1>
    
    <div class="password-box">
     <input class="password-input js-password-input" type="text">
     <button class="copy-button">Copy</button>
    </div>

    <div class="box">
      <label class="password-length-box">
        Password Length
        <input class="password-length-input" type="number">
      </label>
      <label class="check">
        Include UpperCase letters
        <input id="upper-box" type="checkbox">
      </label>
      <label class="check">
        Include lowercase letters
        <input id="lower-box" type="checkbox">
      </label>
      <label class="check">
        Include numbers 
        <input id="numbers-box" type="checkbox">
      </label>
      <label class="check">
        Include symbols
        <input id="symbols-box" type="checkbox">
      </label>
    </div>
    
    <button class="generate-button js-generate-button">Generate Password</button>
   
 
  </div>




  <script src="password.js"></script>
</body>
</html>
